<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 255" width="340" height="255">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f4e"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="1%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFBFC"/>
      <stop offset="100%" style="stop-color:#EDF1F7"/>
    </linearGradient>
    <filter id="pageShadow" x="-8%" y="-5%" width="125%" height="118%">
      <feDropShadow dx="4" dy="5" stdDeviation="7" flood-color="#0A1628" flood-opacity="0.45"/>
    </filter>
    <!-- Scan/photocopy texture overlay -->
    <filter id="scanEffect">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- ── DARK NAVY BACKGROUND ──────────────────────────── -->
  <rect width="340" height="255" rx="6" fill="url(#bgGrad)"/>

  <!-- ── SINGLE SCANNED PAGE ───────────────────────────── -->
  <g filter="url(#pageShadow)">
    <rect x="18" y="12" width="186" height="232" rx="3" fill="url(#pageGrad)"/>

    <!-- Scan tint — slight warm off-white wash to look scanned -->
    <rect x="18" y="12" width="186" height="232" rx="3" fill="#F5E8C8" opacity="0.13"/>

    <!-- Gold top bar -->
    <rect x="18" y="12" width="186" height="5" rx="2 2 0 0" fill="#F5A623"/>

    <!-- Hole punches -->
    <circle cx="35" cy="40" r="5" fill="#D1D9E6"/>
    <circle cx="35" cy="127" r="5" fill="#D1D9E6"/>
    <circle cx="35" cy="214" r="5" fill="#D1D9E6"/>
    <circle cx="35" cy="40" r="3.2" fill="#BEC8D9"/>
    <circle cx="35" cy="127" r="3.2" fill="#BEC8D9"/>
    <circle cx="35" cy="214" r="3.2" fill="#BEC8D9"/>

    <!-- Left margin rule -->
    <line x1="50" y1="12" x2="50" y2="244" stroke="#F5A623" stroke-opacity="0.38" stroke-width="1.3"/>

    <!-- ── HEADER ─────────────────────────────────────── -->
    <rect x="57" y="22" width="48" height="11" rx="5.5" fill="#0A1628" opacity="0.07"/>
    <text x="81" y="31.5" font-family="'Manrope','Arial',sans-serif" font-size="5.8" font-weight="700" letter-spacing="0.11em" fill="#0A1628" text-anchor="middle" opacity="0.5">SCRIPT 04</text>

    <text x="57" y="46" font-family="'Manrope','Arial',sans-serif" font-size="8.5" font-weight="800" fill="#0A1628">Pressure Check-In</text>
    <line x1="57" y1="50" x2="190" y2="50" stroke="#F5A623" stroke-width="1.3"/>
    <text x="57" y="62" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="700" letter-spacing="0.1em" fill="#1E3A5F" opacity="0.6">[ ONE-ON-ONE · 5 MIN ]</text>

    <!-- ── SPEAKER + SCRIPT — small, scan-style ───────── -->
    <text x="57" y="77" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="700" letter-spacing="0.09em" fill="#F5A623">LEADER</text>

    <text font-family="'Georgia','Times New Roman',serif" font-size="6.4" font-style="italic" fill="#3D4F63">
      <tspan x="57" y="89">"I want to check in — not on the work,</tspan>
      <tspan x="57" dy="9.5">but on you. How are you actually doing</tspan>
      <tspan x="57" dy="9.5">right now?"</tspan>
    </text>

    <text x="57" y="122" font-family="'Georgia','Times New Roman',serif" font-size="6" font-style="italic" fill="#94A3B8">( pause — allow silence )</text>

    <text x="57" y="135" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="700" letter-spacing="0.09em" fill="#F5A623">LEADER</text>

    <text font-family="'Georgia','Times New Roman',serif" font-size="6.4" font-style="italic" fill="#3D4F63">
      <tspan x="57" y="147">"What's taking the most mental energy</tspan>
      <tspan x="57" dy="9.5">this week? Tell me what's in the way</tspan>
      <tspan x="57" dy="9.5">and I'll help clear it."</tspan>
    </text>

    <text x="57" y="178" font-family="'Georgia','Times New Roman',serif" font-size="6" font-style="italic" fill="#94A3B8">( lean forward, make eye contact )</text>

    <text x="57" y="191" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="700" letter-spacing="0.09em" fill="#F5A623">LEADER</text>

    <text font-family="'Georgia','Times New Roman',serif" font-size="6.4" font-style="italic" fill="#3D4F63">
      <tspan x="57" y="203">"I've got you. Let's figure out one</tspan>
      <tspan x="57" dy="9.5">thing we can do differently starting</tspan>
      <tspan x="57" dy="9.5">tomorrow morning."</tspan>
    </text>

    <!-- Footer rule + note -->
    <line x1="57" y1="232" x2="190" y2="232" stroke="#DDE3EC" stroke-width="0.8"/>
    <text x="57" y="242" font-family="'Georgia','Times New Roman',serif" font-size="5.8" font-style="italic" fill="#A0ADBF">See also: Script 05 — Reframe Under Fire</text>
    <text x="196" y="242" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="600" fill="#B0BAC9" text-anchor="end">12</text>
  </g>

  <!-- ── RIGHT SIDE PANEL (on dark bg) ──────────────────── -->

  <!-- Vertical gold accent rule -->
  <rect x="222" y="20" width="2.5" height="36" rx="1.2" fill="#F5A623" opacity="0.65"/>

  <!-- Title: Pressure -->
  <text x="232" y="36" font-family="'Manrope','Arial Black',sans-serif" font-size="12" font-weight="800" letter-spacing="-0.02em" fill="#FFFFFF">Pressure</text>
  <!-- Title: to Performance — kept within boundary -->
  <text x="232" y="51" font-family="'Manrope','Arial Black',sans-serif" font-size="10.5" font-weight="800" letter-spacing="-0.02em" fill="#F5A623">to Performance</text>
  <!-- Subtitle -->
  <text x="232" y="64" font-family="'Manrope','Arial',sans-serif" font-size="8" font-weight="500" fill="rgba(255,255,255,0.5)">Scripts</text>

  <!-- Decorative dot row -->
  <circle cx="235" cy="80" r="2.2" fill="#F5A623" opacity="0.75"/>
  <circle cx="243" cy="80" r="2.2" fill="#F5A623" opacity="0.45"/>
  <circle cx="251" cy="80" r="2.2" fill="#F5A623" opacity="0.2"/>

  <!-- 16 badge — tighter to fit number cleanly -->
  <rect x="228" y="90" width="68" height="30" rx="15" fill="#F5A623" fill-opacity="0.1" stroke="#F5A623" stroke-width="0.9" stroke-opacity="0.5"/>
  <text x="262" y="108" font-family="'Manrope','Arial',sans-serif" font-size="13" font-weight="800" fill="#F5A623" text-anchor="middle" text-rendering="geometricPrecision">16</text>
  <text x="262" y="117" font-family="'Manrope','Arial',sans-serif" font-size="6" font-weight="700" letter-spacing="0.12em" fill="#F5A623" text-anchor="middle" opacity="0.8">SCRIPTS</text>

  <!-- Bulleted topic list — white, inside boundaries, x max ~332 -->
  <g font-family="'Manrope','Arial',sans-serif" font-size="7.8" fill="#FFFFFF">
    <circle cx="235" cy="138" r="2" fill="#F5A623"/>
    <text x="243" y="141">Tough feedback</text>

    <circle cx="235" cy="155" r="2" fill="#F5A623"/>
    <text x="243" y="158">Change announcements</text>

    <circle cx="235" cy="172" r="2" fill="#F5A623"/>
    <text x="243" y="175">Pressure check-ins</text>

    <circle cx="235" cy="189" r="2" fill="#F5A623"/>
    <text x="243" y="192">Reframe under fire</text>

    <circle cx="235" cy="206" r="2" fill="#F5A623"/>
    <text x="243" y="209">Trust rebuilds</text>
  </g>

  <!-- Author line -->
  <text x="232" y="240" font-family="'Manrope','Arial',sans-serif" font-size="6.5" font-weight="600" letter-spacing="0.07em" fill="rgba(255,255,255,0.28)">JASON JONES, PH.D.</text>
</svg>
